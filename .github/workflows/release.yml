name: Release

# A cada push a main: calcula la propera versió a partir dels missatges de commit
# (Conventional Commits), crea el tag i la release, i puja la imatge a ghcr.io.
on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false # no cancel·lem releases a mig fer

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # gerardag/pulsa

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # crear el tag i la release
      packages: write # pujar la imatge a ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # cal tot l'historial per veure tags i commits previs

      # Decideix patch/minor/major segons els missatges de commit i crea el tag.
      # Sense prefix conegut -> patch. 'feat:' -> minor. 'feat!:'/'BREAKING CHANGE:' -> major.
      - name: Calcula la propera versió
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Log in a GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build i push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # latest + la versió calculada (ex: 1.3.0) + el SHA exacte.
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.new_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Crea la release de GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: |
            ${{ steps.tag.outputs.changelog }}

            Imatge desplegable:
            `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.new_version }}`

            Per desplegar al servidor:
            ```
            VERSION=${{ steps.tag.outputs.new_version }} docker compose -f docker-compose.prod.yml pull
            VERSION=${{ steps.tag.outputs.new_version }} docker compose -f docker-compose.prod.yml up -d
            ```
